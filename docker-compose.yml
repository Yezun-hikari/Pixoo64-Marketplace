version: '3.8'

services:
  hub:
    image: ghcr.io/yezun-hikari/pixoo64-marketplace:latest
    # network_mode: "host"
    ports:
      - "8000:8000"
    volumes:
      - ./plugins:/app/plugins
      - ./settings.json:/app/settings.json
      - ./repositories.json:/app/repositories.json
    restart: unless-stopped
